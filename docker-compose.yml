name: ai-usage-dashboard

services:
  ai-usage-dashboard:
    build: .
    ports:
      - "4318:4318"
    volumes:
      - ai-usage-dashboard-data:/data
    environment:
      CUA_ADDR: ":4318"
      CUA_DB: "/data/ai-usage-dashboard.sqlite"
      CUA_DEBUG_OTEL_KEYS: "${CUA_DEBUG_OTEL_KEYS:-}"

volumes:
  ai-usage-dashboard-data:
